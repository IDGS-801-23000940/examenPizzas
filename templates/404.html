{% extends 'layout.html' %}

{% block title %}404 - No Encontrado{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-20 animate-fade-in-up text-center">
    <div class="relative mb-6">
        <span class="text-8xl font-black bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent">404</span>
    </div>
    <h2 class="text-2xl md:text-3xl font-bold text-white mt-2 mb-3">Página no encontrada</h2>
    <p class="text-gray-400 mb-8 max-w-md">El pedido o la página que buscas no existe en nuestra base de datos.</p>
    <a href="{{ url_for('main.index') }}" class="btn-primary inline-flex items-center gap-2 px-8 py-3 rounded-xl text-white font-semibold shadow-lg">
        🏠 Volver al Inicio
    </a>
</div>
{% endblock %}
